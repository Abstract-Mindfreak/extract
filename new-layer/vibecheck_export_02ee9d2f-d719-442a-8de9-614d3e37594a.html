<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linked Studio Explorer</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --text: #2d3436;
            --layer1: #ff4757;
            --layer2: #1e90ff;
            --layer3: #2ed573;
            --accent: #ffa502;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding: 10px;
        }

        .container {
            width: 800px;
            height: 600px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 20px;
            border: 2px solid #eee;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        h1 { font-size: 1.4rem; color: var(--layer2); margin-bottom: 10px; }

        .modes {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .modes label {
            background: #eee;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
            user-select: none;
        }

        .modes input:checked + label {
            background: var(--layer2);
            color: white;
            box-shadow: 0 4px 10px rgba(30, 144, 255, 0.3);
        }

        .modes input { display: none; }

        .workspace {
            flex: 1;
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 5;
            gap: 40px;
            overflow: hidden;
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            scrollbar-width: thin;
            padding: 5px;
        }

        .column-title {
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-align: center;
            color: #888;
            position: sticky;
            top: 0;
            background: var(--card-bg);
            padding: 5px;
        }

        .item {
            padding: 10px;
            background: #f1f2f6;
            border-radius: 10px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item:hover { background: #e2e2e2; transform: translateX(2px); }
        .item.active { border-color: var(--accent); background: #fffbe6; }
        .item.highlight-l1 { background: var(--layer1); color: white; }
        .item.highlight-l2 { background: var(--layer2); color: white; }
        .item.highlight-l3 { background: var(--layer3); color: white; }

        .checkbox-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255,255,255,0.9);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #ddd;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            max-height: 120px;
            overflow-y: auto;
            z-index: 20;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        svg#connector {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .line {
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            opacity: 0.6;
            transition: d 0.4s ease;
        }

        .emoji { font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎙️ Студийный Навигатор</h1>
        <div class="modes">
            <input type="radio" name="mode" id="m1" value="mds" checked>
            <label for="m1">Микрофон ➔ Город ➔ Студия</label>
            <input type="radio" name="mode" id="m2" value="csm">
            <label for="m2">Город ➔ Студия ➔ Микрофон</label>
            <input type="radio" name="mode" id="m3" value="cms">
            <label for="m3">Город ➔ Микрофон ➔ Студия</label>
        </div>
    </header>

    <div class="workspace">
        <div class="column" id="col1"></div>
        <div class="column" id="col2"></div>
        <div class="column" id="col3"></div>
        <svg id="connector"></svg>
    </div>

    <div class="checkbox-container" id="mic-filters">
        <!-- Mic filters populated via JS -->
    </div>
</div>

<script type="application/json" id="data-payload">
{
    "studios": [
        {"id": 10139, "name": "Камертон", "city": "Санкт-Петербург", "devices": ["017_fet"]},
        {"id": 10140, "name": "Студия J-one", "city": "Москва", "devices": ["017_tube", "017_fet"]},
        {"id": 10142, "name": "Гигант Рекорд", "city": "Москва", "devices": ["017_tube", "023_bomblet", "011_fet"]},
        {"id": 10143, "name": "Первая Союзная", "city": "Тула", "devices": ["017_tube", "017_fet", "023_bomblet", "013_fet"]},
        {"id": 10144, "name": "Первая Союзная МСК", "city": "Москва", "devices": ["017_tube", "017_fet", "013_tube", "lakeside"]},
        {"id": 10149, "name": "2Z", "city": "Калининград", "devices": ["017_tube", "013_fet"]},
        {"id": 10151, "name": "Goya Recording", "city": "Челябинск", "devices": ["023_bomblet"]},
        {"id": 10152, "name": "ARCUS Records", "city": "Москва", "devices": ["017_fet", "013_fet"]},
        {"id": 10156, "name": "Honky Tonky", "city": "Екатеринбург", "devices": ["017_fet", "1973_s"]},
        {"id": 10160, "name": "113Studio", "city": "Калининград", "devices": ["017_fet", "023_bomblet", "lakeside"]},
        {"id": 10164, "name": "1061 Studio", "city": "Санкт-Петербург", "devices": ["017_fet", "023_bomblet", "013_fet"]},
        {"id": 10180, "name": "Rainbow Studios", "city": "Симферополь", "devices": ["023_bomblet"]},
        {"id": 10185, "name": "TTREC Омск", "city": "Омск", "devices": ["017_tube"]}
    ],
    "mics": [
        {"val": "017_fet", "label": "017 FET"},
        {"val": "017_tube", "label": "017 TUBE"},
        {"val": "023_bomblet", "label": "023 the Bomblet"},
        {"val": "011_fet", "label": "011 FET"},
        {"val": "013_fet", "label": "013 FET"},
        {"val": "013_tube", "label": "013 TUBE"},
        {"val": "1973_s", "label": "1973-S"},
        {"val": "lakeside", "label": "Lakeside"}
    ]
}
</script>

<script>
    const data = JSON.parse(document.getElementById('data-payload').textContent);
    const col1 = document.getElementById('col1');
    const col2 = document.getElementById('col2');
    const col3 = document.getElementById('col3');
    const micFilters = document.getElementById('mic-filters');
    const connector = document.getElementById('connector');
    const modes = document.querySelectorAll('input[name="mode"]');

    let currentMode = 'mds'; // Default: Mic -> City -> Studio
    let selectedMics = new Set(['017_fet', '017_tube']);
    let activeItem = null;

    function initFilters() {
        data.mics.forEach(mic => {
            const label = document.createElement('label');
            label.className = 'checkbox-item';
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.value = mic.val;
            cb.checked = selectedMics.has(mic.val);
            cb.addEventListener('change', () => {
                if (cb.checked) selectedMics.add(cb.val);
                else selectedMics.delete(cb.val);
                render();
            });
            label.appendChild(cb);
            label.append(mic.label);
            micFilters.appendChild(label);
        });
    }

    function getUniqueCities() {
        return [...new Set(data.studios.map(s => s.city))].sort();
    }

    function render() {
        col1.innerHTML = ''; col2.innerHTML = ''; col3.innerHTML = '';
        connector.innerHTML = '';
        
        const cities = getUniqueCities();
        const studios = data.studios.filter(s => s.devices.some(d => selectedMics.has(d)));
        const mics = data.mics.filter(m => selectedMics.has(m.val));

        if (currentMode === 'mds') {
            setupColumn(col1, 'Микрофоны', mics, 'mic', '🎙️');
            setupColumn(col2, 'Города', cities.map(c => ({val: c, label: c})), 'city', '📍');
            setupColumn(col3, 'Студии', studios.map(s => ({val: s.id, label: s.name, city: s.city, mics: s.devices})), 'studio', '🎧');
        } else if (currentMode === 'csm') {
            setupColumn(col1, 'Города', cities.map(c => ({val: c, label: c})), 'city', '📍');
            setupColumn(col2, 'Студии', studios.map(s => ({val: s.id, label: s.name, city: s.city, mics: s.devices})), 'studio', '🎧');
            setupColumn(col3, 'Микрофоны', mics, 'mic', '🎙️');
        } else {
            setupColumn(col1, 'Города', cities.map(c => ({val: c, label: c})), 'city', '📍');
            setupColumn(col2, 'Микрофоны', mics, 'mic', '🎙️');
            setupColumn(col3, 'Студии', studios.map(s => ({val: s.id, label: s.name, city: s.city, mics: s.devices})), 'studio', '🎧');
        }
        
        updateConnections();
    }

    function setupColumn(container, title, items, type, emoji) {
        const titleEl = document.createElement('div');
        titleEl.className = 'column-title';
        titleEl.textContent = title;
        container.appendChild(titleEl);

        items.forEach(item => {
            const el = document.createElement('div');
            el.className = 'item';
            el.dataset.type = type;
            el.dataset.val = item.val;
            el.innerHTML = `<span class="emoji">${emoji}</span> ${item.label}`;
            
            el.addEventListener('mouseenter', () => {
                activeItem = { type, val: item.val, data: item };
                updateConnections();
            });
            el.addEventListener('mouseleave', () => {
                activeItem = null;
                updateConnections();
            });
            
            container.appendChild(el);
        });
    }

    function updateConnections() {
        connector.innerHTML = '';
        document.querySelectorAll('.item').forEach(i => i.classList.remove('highlight-l1', 'highlight-l2', 'highlight-l3'));

        if (!activeItem) return;

        const connections = [];
        const { type, val } = activeItem;
        
        // Find links
        const items = Array.from(document.querySelectorAll('.item'));
        const sourceEl = items.find(i => i.dataset.type === type && i.dataset.val == val);
        if (!sourceEl) return;
        sourceEl.classList.add('highlight-l1');

        if (currentMode === 'mds') { // Mic -> City -> Studio
            if (type === 'mic') {
                const targetCities = [...new Set(data.studios.filter(s => s.devices.includes(val)).map(s => s.city))];
                targetCities.forEach(city => {
                    const cityEl = items.find(i => i.dataset.type === 'city' && i.dataset.val === city);
                    if (cityEl) {
                        cityEl.classList.add('highlight-l2');
                        drawLink(sourceEl, cityEl, 'var(--layer2)');
                        // Layer 3
                        data.studios.filter(s => s.city === city && s.devices.includes(val)).forEach(st => {
                            const stEl = items.find(i => i.dataset.type === 'studio' && i.dataset.val == st.id);
                            if (stEl) {
                                stEl.classList.add('highlight-l3');
                                drawLink(cityEl, stEl, 'var(--layer3)');
                            }
                        });
                    }
                });
            }
        } else if (currentMode === 'csm') { // City -> Studio -> Mic
            if (type === 'city') {
                data.studios.filter(s => s.city === val).forEach(st => {
                    const stEl = items.find(i => i.dataset.type === 'studio' && i.dataset.val == st.id);
                    if (stEl) {
                        stEl.classList.add('highlight-l2');
                        drawLink(sourceEl, stEl, 'var(--layer2)');
                        st.devices.forEach(m => {
                            const micEl = items.find(i => i.dataset.type === 'mic' && i.dataset.val === m);
                            if (micEl) {
                                micEl.classList.add('highlight-l3');
                                drawLink(stEl, micEl, 'var(--layer3)');
                            }
                        });
                    }
                });
            }
        } else { // City -> Mic -> Studio
            if (type === 'city') {
                const cityMics = [...new Set(data.studios.filter(s => s.city === val).flatMap(s => s.devices))];
                cityMics.forEach(m => {
                    const micEl = items.find(i => i.dataset.type === 'mic' && i.dataset.val === m);
                    if (micEl) {
                        micEl.classList.add('highlight-l2');
                        drawLink(sourceEl, micEl, 'var(--layer2)');
                        data.studios.filter(s => s.city === val && s.devices.includes(m)).forEach(st => {
                            const stEl = items.find(i => i.dataset.type === 'studio' && i.dataset.val == st.id);
                            if (stEl) {
                                stEl.classList.add('highlight-l3');
                                drawLink(micEl, stEl, 'var(--layer3)');
                            }
                        });
                    }
                });
            }
        }
    }

    function drawLink(el1, el2, color) {
        const rect1 = el1.getBoundingClientRect();
        const rect2 = el2.getBoundingClientRect();
        const containerRect = connector.getBoundingClientRect();

        const x1 = rect1.right - containerRect.left;
        const y1 = rect1.top + rect1.height / 2 - containerRect.top;
        const x2 = rect2.left - containerRect.left;
        const y2 = rect2.top + rect2.height / 2 - containerRect.top;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const cp1x = x1 + (x2 - x1) / 2;
        const cp2x = x1 + (x2 - x1) / 2;
        
        path.setAttribute('d', `M ${x1} ${y1} C ${cp1x} ${y1}, ${cp2x} ${y2}, ${x2} ${y2}`);
        path.setAttribute('class', 'line');
        path.setAttribute('stroke', color);
        connector.appendChild(path);
    }

    modes.forEach(m => m.addEventListener('change', (e) => {
        currentMode = e.target.value;
        render();
    }));

    window.addEventListener('resize', render);
    initFilters();
    render();

</script>
</body>
</html>
