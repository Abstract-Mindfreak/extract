<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Golden Ratio Flexbox Style</title>
    <link rel="stylesheet" href="https://public.codepenassets.com/css/reset-2.0.min.css">
<link rel="stylesheet" href="./style.css">
<script src="https://public.codepenassets.com/js/prefixfree-1.0.7.min.js"></script>

  </head>
    
  <body>
  <section>
  <div class="square green">
  </div>
  <div class="flex-col-2">
    <div class="tall-rect orange"></div>
    <div class="wide-rect yellow">
      <div class="flex-col-2">
        <div class="wide-rect aqua">
          <div class="square yellow">
          </div>
          <div class="flex-col-2">
            <div class="tall-rect blue"></div>

            <div class="wide-rect ">
              <div class="flex-col-2">
                <div class="wide-rect aqua"></div>
                <div class="tall-rect orange"></div>
              </div>
              <div class="square green">
              </div>
            </div>
          </div>
        </div>
        <div class="tall-rect blue"></div>
      </div>
      <div class="square aqua">
      </div>
    </div>
  </div>
</section>
    
  </body>
  
</html>
