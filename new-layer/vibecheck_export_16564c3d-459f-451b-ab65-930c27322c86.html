<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soyuz Studio - Golden Ratio Hyper-Linker</title>
    <style>
        :root {
            --phi: 1.61803398875;
            --bg: #050505;
            --card-bg: #0f0f0f;
            --gold: #d4af37;
            --gold-bright: #ffdf7e;
            --gold-muted: #8a7327;
            --text: #e0e0e0;
            --text-dim: #777;
            --accent-1: #ff4757; /* Mode 1 Line */
            --accent-2: #2ed573; /* Mode 2 Line */
            --accent-3: #1e90ff; /* Mode 3 Line */
            --card-w: 320px;
            --card-h: 440px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- UI LAYOUT --- */
        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5,5,5,0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            position: sticky;
            top: 0;
        }

        .branding h1 {
            font-family: serif;
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: var(--gold);
            text-transform: uppercase;
        }

        main {
            display: grid;
            grid-template-columns: 280px 1fr;
            flex: 1;
            position: relative;
        }

        /* --- SIDEBAR FILTERS --- */
        .sidebar {
            padding: 2rem;
            border-right: 1px solid #222;
            height: calc(100vh - 80px);
            overflow-y: auto;
            background: #080808;
            z-index: 90;
        }

        .filter-group { margin-bottom: 2rem; }
        .filter-group h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold-muted);
            margin-bottom: 1rem;
            border-bottom: 1px solid #222;
            padding-bottom: 0.5rem;
        }

        .mode-selector label {
            display: block;
            padding: 0.6rem;
            margin-bottom: 0.5rem;
            border: 1px solid #222;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-selector input { display: none; }
        .mode-selector label:has(input:checked) {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold-bright);
        }

        .check-list { display: flex; flex-direction: column; gap: 0.4rem; }
        .check-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--text-dim);
            transition: 0.2s;
        }
        .check-item:hover { color: var(--text); }
        .check-item input:checked + span { color: var(--gold); font-weight: 600; }

        /* --- CONTENT GRID --- */
        .viewport {
            padding: 2rem;
            position: relative;
            min-height: 1000px;
        }

        .studio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
            gap: 2rem;
            z-index: 5;
            position: relative;
        }

        /* --- GOLDEN RATIO CARDS --- */
        .card {
            background: var(--card-bg);
            height: var(--card-h);
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .card-top { padding: 1.5rem; display: flex; flex-direction: column; }
        .card-bottom { margin-top: auto; padding: 1.5rem; background: rgba(0,0,0,0.3); border-top: 1px solid #222; }

        .card-title { font-family: serif; font-weight: 500; margin-bottom: 0.5rem; line-height: 1.1; }
        .card-subtitle { font-size: 0.7rem; text-transform: uppercase; color: var(--gold-muted); letter-spacing: 1px; margin-bottom: 1rem; }
        .card-desc { font-size: 0.85rem; color: var(--text-dim); line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        
        .mic-tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 1rem; }
        .mic-tag { font-size: 0.65rem; padding: 2px 6px; border: 1px solid #333; border-radius: 4px; background: #000; color: #aaa; }
        .mic-tag.highlight { border-color: var(--gold); color: var(--gold); }

        /* --- CONNECTIONS SVG --- */
        #connector-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .link-path {
            fill: none;
            stroke-width: 2;
            stroke-dasharray: 5,5;
            animation: dash 10s linear infinite;
            opacity: 0.6;
            transition: d 0.5s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.3s;
        }
        @keyframes dash { to { stroke-dashoffset: -100; } }

        .floating-label {
            position: absolute;
            font-size: 10px;
            background: var(--bg);
            padding: 2px 6px;
            border: 1px solid var(--gold-muted);
            border-radius: 10px;
            color: var(--gold);
            pointer-events: none;
            z-index: 20;
            transform: translate(-50%, -50%);
            white-space: nowrap;
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold-muted); }

    </style>
</head>
<body>

<header>
    <div class="branding">
        <h1>Soyuz Studios Map</h1>
    </div>
    <div class="stats" id="match-count" style="font-size: 0.8rem; color: var(--gold-muted);">
        Active Connections: 0
    </div>
</header>

<main>
    <div class="sidebar">
        <div class="filter-group">
            <h3>Mapping Mode</h3>
            <div class="mode-selector" id="mode-select">
                <label><input type="radio" name="mode" value="1" checked> 1. Mic ➔ City ➔ Studio</label>
                <label><input type="radio" name="mode" value="2"> 2. City ➔ Studio ➔ Mic</label>
                <label><input type="radio" name="mode" value="3"> 3. City ➔ Mic ➔ Studio</label>
            </div>
        </div>

        <div class="filter-group">
            <h3>Cities (Single)</h3>
            <div class="check-list" id="city-list">
                <!-- JS Inject -->
            </div>
        </div>

        <div class="filter-group">
            <h3>Devices (Multiple)</h3>
            <div class="check-list" id="mic-list">
                <!-- JS Inject -->
            </div>
        </div>
    </div>

    <div class="viewport" id="viewport">
        <svg id="connector-svg"></svg>
        <div id="labels-layer"></div>
        <div class="studio-grid" id="studio-grid">
            <!-- Cards JS Inject -->
        </div>
    </div>
</main>

<script type="application/json" id="studios-payload">
{
    "studios": [
        {"id": 10139, "name": "Камертон", "city": "Санкт-Петербург", "description": "Студия для подкастов и видеосъёмки в центре Санкт-Петербурга. Премиальные микрофоны СОЮЗ FET 017.", "devices": [{"value": "017_fet", "label": "017 FET"}]},
        {"id": 10140, "name": "Студия J-one", "city": "Москва", "description": "Студия в центре Москвы, пять залов, 10 микрофонов Союз.", "devices": [{"value": "017_tube", "label": "017 TUBE"}, {"value": "017_fet", "label": "017 FET"}]},
        {"id": 10141, "name": "iPodcast", "city": "Москва", "description": "Студия съемки контента. Подкасты, вебинары, экспертные видео.", "devices": [{"value": "017_tube", "label": "017 TUBE"}, {"value": "017_fet", "label": "017 FET"}]},
        {"id": 10142, "name": "«Гигант Рекорд»", "city": "Москва", "description": "Одна из старейших студий страны. Специализируемся на записи барабанов.", "devices": [{"value": "017_tube", "label": "017 TUBE"}, {"value": "023_bomblet", "label": "023 the Bomblet"}, {"value": "023_malfa", "label": "023 Malfa"}, {"value": "1973_s", "label": "1973-S"}, {"value": "011_fet", "label": "011 FET"}]},
        {"id": 10143, "name": "Первая Союзная", "city": "Тула", "description": "Идеальное пространство для подкастов и видеоблогов. Полная линейка микрофонов.", "devices": [{"value": "017_tube", "label": "017 TUBE"}, {"value": "013_fet", "label": "013 FET"}, {"value": "lakeside", "label": "Lakeside"}]},
        {"id": 10148, "name": "SEVERSTUDIORND", "city": "Ростов-на-Дону", "description": "Продакшн студия полного цикла от написания минуса до релиза.", "devices": [{"value": "lakeside", "label": "Lakeside"}]},
        {"id": 10151, "name": "Goya Recording", "city": "Челябинск", "description": "Дом для всех рок и метал артистов Южного Урала.", "devices": [{"value": "023_bomblet", "label": "023 the Bomblet"}]},
        {"id": 10156, "name": "Honky Tonky", "city": "Екатеринбург", "description": "Студия твоей мечты.", "devices": [{"value": "017_fet", "label": "017 FET"}, {"value": "1973_s", "label": "1973-S"}]}
    ],
    "filters": {
        "city": ["Москва", "Санкт-Петербург", "Тула", "Ростов-на-Дону", "Челябинск", "Екатеринбург"],
        "device": [
            {"value": "017_fet", "label": "017 FET"},
            {"value": "017_tube", "label": "017 TUBE"},
            {"value": "023_bomblet", "label": "023 Bomblet"},
            {"value": "1973_s", "label": "1973-S"},
            {"value": "lakeside", "label": "Lakeside"}
        ]
    }
}
</script>

<script>
    const data = JSON.parse(document.getElementById('studios-payload').textContent);
    const studioGrid = document.getElementById('studio-grid');
    const cityList = document.getElementById('city-list');
    const micList = document.getElementById('mic-list');
    const modeSelect = document.getElementById('mode-select');
    const svg = document.getElementById('connector-svg');
    const labelsLayer = document.getElementById('labels-layer');
    const viewport = document.getElementById('viewport');

    let currentMode = "1";
    let selectedCity = "";
    let selectedMics = [];

    // --- GOLDEN RATIO ENGINE ---
    class GoldenRatioLayout {
        static apply(card) {
            const h = card.offsetHeight;
            const top = card.querySelector('.card-top');
            const bottom = card.querySelector('.card-bottom');
            const title = card.querySelector('.card-title');
            
            // H_top / H_bottom approx Phi
            const topH = h * (data.phi_inv || 0.618);
            top.style.height = `${topH}px`;
            
            // Typography scaling
            const titleSize = Math.max(16, (topH / 10) * 1.618);
            title.style.fontSize = `${titleSize}px`;
        }
    }

    // --- INITIALIZATION ---
    function init() {
        // Cities
        data.filters.city.forEach(city => {
            const label = document.createElement('label');
            label.className = 'check-item';
            label.innerHTML = `<input type="radio" name="city" value="${city}"> <span>${city}</span>`;
            label.querySelector('input').addEventListener('change', (e) => {
                selectedCity = e.target.value;
                update();
            });
            cityList.appendChild(label);
        });

        // Mics
        data.filters.device.forEach(mic => {
            const label = document.createElement('label');
            label.className = 'check-item';
            label.innerHTML = `<input type="checkbox" value="${mic.value}"> <span>${mic.label}</span>`;
            label.querySelector('input').addEventListener('change', (e) => {
                if(e.target.checked) selectedMics.push(e.target.value);
                else selectedMics = selectedMics.filter(m => m !== e.target.value);
                update();
            });
            micList.appendChild(label);
        });

        // Mode
        modeSelect.querySelectorAll('input').forEach(input => {
            input.addEventListener('change', (e) => {
                currentMode = e.target.value;
                update();
            });
        });

        renderStudios();
        window.addEventListener('resize', update);
        update();
    }

    function renderStudios() {
        studioGrid.innerHTML = data.studios.map(s => `
            <div class="card" id="studio-${s.id}" data-city="${s.city}" data-mics='${JSON.stringify(s.devices.map(d => d.value))}'>
                <div class="card-top">
                    <div class="card-subtitle">${s.city}</div>
                    <h2 class="card-title">${s.name}</h2>
                    <p class="card-desc">${s.description}</p>
                </div>
                <div class="card-bottom">
                    <div class="mic-tag-list">
                        ${s.devices.map(d => `<span class="mic-tag" data-val="${d.value}">${d.label}</span>`).join('')}
                    </div>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.card').forEach(c => GoldenRatioLayout.apply(c));
    }

    // --- LOGIC ENGINE ---
    function update() {
        const cards = document.querySelectorAll('.card');
        const paths = [];
        const labels = [];
        let connections = 0;

        // Reset visuals
        cards.forEach(c => {
            c.style.opacity = "0.3";
            c.querySelectorAll('.mic-tag').forEach(t => t.classList.remove('highlight'));
        });
        svg.innerHTML = '';
        labelsLayer.innerHTML = '';

        if (currentMode === "1") { // Mic -> City -> Studio
            // Color: Accent 1 (Red)
            selectedMics.forEach(micVal => {
                const sourceEl = micList.querySelector(`input[value="${micVal}"]`).parentElement;
                data.studios.forEach(s => {
                    if (s.devices.some(d => d.value === micVal)) {
                        const targetCard = document.getElementById(`studio-${s.id}`);
                        targetCard.style.opacity = "1";
                        targetCard.querySelector(`.mic-tag[data-val="${micVal}"]`)?.classList.add('highlight');
                        paths.push({ from: sourceEl, to: targetCard, color: 'var(--accent-1)', label: s.city });
                        connections++;
                    }
                });
            });
        } 
        else if (currentMode === "2") { // City -> Studio -> Mic
            // Color: Accent 2 (Green)
            if (selectedCity) {
                const sourceEl = cityList.querySelector(`input[value="${selectedCity}"]`).parentElement;
                data.studios.forEach(s => {
                    if (s.city === selectedCity) {
                        const targetCard = document.getElementById(`studio-${s.id}`);
                        targetCard.style.opacity = "1";
                        s.devices.forEach(d => {
                            const micLabel = micList.querySelector(`input[value="${d.value}"]`).parentElement;
                            paths.push({ from: sourceEl, to: micLabel, color: 'var(--accent-2)', label: s.name });
                            connections++;
                        });
                    }
                });
            }
        }
        else if (currentMode === "3") { // City -> Mic -> Studio
            // Color: Accent 3 (Blue)
            if (selectedCity) {
                const sourceEl = cityList.querySelector(`input[value="${selectedCity}"]`).parentElement;
                data.studios.forEach(s => {
                    if (s.city === selectedCity) {
                        const targetCard = document.getElementById(`studio-${s.id}`);
                        targetCard.style.opacity = "1";
                        paths.push({ from: sourceEl, to: targetCard, color: 'var(--accent-3)', label: s.devices.map(d => d.label).join(', ') });
                        connections++;
                    }
                });
            }
        }

        drawPaths(paths);
        document.getElementById('match-count').innerText = `Active Connections: ${connections}`;
    }

    function drawPaths(paths) {
        const viewRect = viewport.getBoundingClientRect();
        
        paths.forEach(p => {
            const r1 = p.from.getBoundingClientRect();
            const r2 = p.to.getBoundingClientRect();

            const x1 = r1.left + r1.width - viewRect.left;
            const y1 = r1.top + r1.height/2 - viewRect.top;
            const x2 = r2.left - viewRect.left;
            const y2 = r2.top + r2.height/2 - viewRect.top;

            const cp1x = x1 + (x2 - x1) * 0.5;
            const cp2x = x1 + (x2 - x1) * 0.5;

            const d = `M ${x1} ${y1} C ${cp1x} ${y1}, ${cp2x} ${y2}, ${x2} ${y2}`;
            
            const pathEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
            pathEl.setAttribute("d", d);
            pathEl.setAttribute("class", "link-path");
            pathEl.setAttribute("stroke", p.color);
            svg.appendChild(pathEl);

            // Floating Label for Step 2
            const label = document.createElement('div');
            label.className = 'floating-label';
            label.innerText = p.label;
            label.style.left = `${cp1x}px`;
            label.style.top = `${(y1 + y2) / 2}px`;
            label.style.borderColor = p.color;
            labelsLayer.appendChild(label);
        });
    }

    init();

</script>

</body>
</html>
