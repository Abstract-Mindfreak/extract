<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MSS: PRISMATIC SYNTHESIS ENGINE</title>
    <style>
        :root {
            --hue: 200;
            --sat: 90%;
            --lit: 50%;
            --glow: hsla(var(--hue), var(--sat), var(--lit), 0.6);
            --primary: hsl(var(--hue), var(--sat), var(--lit));
            --accent: hsl(calc(var(--hue) + 180), 80%, 60%);
            --bg-dark: #0a0908;
            --metal: #1f1b19;
            --knob-body: #181818;
            --knob-ind: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', 'Roboto Mono', monospace;
            user-select: none;
            touch-action: none;
        }

        #synth-container {
            position: relative;
            height: 98vh;
            width: auto;
            aspect-ratio: 723.08 / 1195.18;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.8));
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Interactive Elements */
        .control-interactive {
            cursor: grab;
            transform-box: fill-box;
            transform-origin: center;
            transition: filter 0.1s;
        }
        .control-interactive:active { cursor: grabbing; }
        .control-interactive:hover { filter: drop-shadow(0 0 4px var(--primary)); }

        /* Dynamic Colors */
        .color-sync-fill { fill: var(--primary); transition: fill 0.1s linear; }
        .color-sync-stroke { stroke: var(--primary); transition: stroke 0.1s linear; }
        .accent-sync-fill { fill: var(--accent); transition: fill 0.1s linear; }

        /* Screen Elements */
        #oscilloscope {
            mix-blend-mode: screen;
            pointer-events: none;
        }
        
        #xy-touch-zone {
            fill: transparent;
            cursor: crosshair;
        }

        .led-active {
            filter: drop-shadow(0 0 8px var(--primary));
            fill: var(--primary) !important;
        }

        /* Overlay */
        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 9, 8, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(8px);
            transition: opacity 0.6s ease-out;
            text-align: center;
        }

        h1 {
            font-weight: 100;
            letter-spacing: 0.5em;
            margin-bottom: 2rem;
            color: var(--primary);
            text-shadow: 0 0 20px var(--glow);
        }

        button {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 1rem 3rem;
            font-size: 1.2rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px var(--glow), inset 0 0 10px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        button:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 40px var(--primary);
        }

        .scanline {
            fill: url(#scanline-grad);
            opacity: 0.1;
            pointer-events: none;
        }

        /* Knob Rings */
        .knob-ring-bg { fill: none; stroke: #333; stroke-width: 4; }
        .knob-ring-val { fill: none; stroke: var(--primary); stroke-width: 4; stroke-linecap: round; filter: drop-shadow(0 0 2px var(--primary)); }

    </style>
</head>
<body>

    <div id="synth-container">
        <!-- Canvas for high-performance waveform rendering -->
        <canvas id="screen-canvas" style="position: absolute; top: 7.2%; left: 8.5%; width: 83%; height: 42.5%; border-radius: 6px; pointer-events: none; z-index: 10;"></canvas>

        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 723.08 1195.18" id="main-interface">
            <defs>
                <linearGradient id="metal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#2a2624;stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#1a1716;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#0f0d0c;stop-opacity:1" />
                </linearGradient>
                <radialGradient id="knob-grad">
                    <stop offset="80%" stop-color="#111"/>
                    <stop offset="100%" stop-color="#333"/>
                </radialGradient>
                <pattern id="scanline-grad" x="0" y="0" width="100%" height="4" patternUnits="userSpaceOnUse">
                    <rect y="0" width="100%" height="2" fill="black" opacity="0.5"/>
                </pattern>
                <filter id="glow-fx">
                    <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <!-- Reusable Knob Geometry -->
                <g id="knob-asset">
                    <circle cx="0" cy="0" r="32" fill="url(#knob-grad)" stroke="#222" stroke-width="2"/>
                    <!-- Indicator tick -->
                    <rect x="-3" y="-28" width="6" height="12" fill="var(--knob-ind)" rx="1"/>
                    <!-- Texture rings -->
                    <circle cx="0" cy="0" r="28" fill="none" stroke="#000" stroke-width="1" opacity="0.5"/>
                    <circle cx="0" cy="0" r="20" fill="none" stroke="#000" stroke-width="1" opacity="0.5"/>
                </g>
            </defs>

            <!-- BACKGROUND CHASSIS (Optimized from input) -->
            <g id="chassis">
                <rect x="54.8" width="668.2" height="1187.2" fill="#1f1b19"/>
                <rect x="54.8" width="212.4" height="1188" fill="#1a1816"/>
                <!-- Speaker Grill -->
                <path d="M594,619.7q0,281,0,562c0,7-2.5,12-5.7,12H7c-8.8-1.4-6.1-3.1-6.1-4.7Q.2,901,.4,611c0-1.6-2.7-3.3,6.1-4.7H588C591,607,594,612,594,619Z" fill="#141210"/>
                <path d="M594,13.2q0,294,0,588c0,7-2.5,13-5.7,13L7,614c-8.8-1.5-6.1-3.2-6.1-5Q.2,307,.4,5c0-1.6-2.7-3.4,6.1-5A3.1,3.1,0,0,1,7,0L588,0C591,0,594,5.9,594,13.2Z" fill="#141210"/>
                
                <!-- Main Screen Bezel -->
                <rect x="61.3" y="85" width="655.2" height="508.8" rx="6.8" fill="#050505" stroke="#333" stroke-width="2"/>
                
                <!-- Control Panels -->
                <rect x="129" y="632" width="460" height="324" rx="11" fill="url(#metal-grad)" stroke="#000" stroke-width="2"/>
                <rect x="69" y="823" width="158" height="357" rx="11" fill="url(#metal-grad)" stroke="#000" stroke-width="2"/>
                
                <!-- Decorative Bars -->
                <rect x="178" y="850" width="377" height="31" fill="#111"/>
                <rect x="344" y="889" width="116" height="6" class="color-sync-fill"/>
            </g>

            <!-- SCREEN INTERACTION AREA -->
            <rect id="xy-touch-zone" x="61.3" y="85" width="655.2" height="508.8" rx="6.8"/>
            <rect x="61.3" y="85" width="655.2" height="508.8" class="scanline" rx="6.8"/>

            <!-- CONTROLS LAYER -->
            <!-- We will programmatically place knobs to ensure they fit the grid -->
            <g id="controls-layer">
                <!-- Top Panel Knobs (Oscillators) -->
                <!-- Knob 1: Prism (Color) -->
                <g class="control-interactive" id="knob-prism" transform="translate(200, 710)" data-param="prism" data-min="0" data-max="360" data-val="200">
                    <circle r="42" class="knob-ring-bg"/>
                    <path class="knob-ring-val color-sync-stroke" d="M0,-42 A42,42 0 1,1 -0.1,-42" stroke-dasharray="264" stroke-dashoffset="100"/>
                    <use href="#knob-asset"/>
                    <text y="55" fill="#888" text-anchor="middle" font-size="14" font-family="monospace">PRISM</text>
                </g>

                <!-- Knob 2: Osc 1 Shape/Morph -->
                <g class="control-interactive" id="knob-shape" transform="translate(360, 710)" data-param="shape" data-min="0" data-max="1" data-val="0">
                    <circle r="42" class="knob-ring-bg"/>
                    <path class="knob-ring-val" d="M0,-42 A42,42 0 1,1 -0.1,-42" stroke-dasharray="264" stroke-dashoffset="264"/>
                    <use href="#knob-asset"/>
                    <text y="55" fill="#888" text-anchor="middle" font-size="14" font-family="monospace">MORPH</text>
                </g>

                <!-- Knob 3: Osc 2 Detune -->
                <g class="control-interactive" id="knob-detune" transform="translate(520, 710)" data-param="detune" data-min="0" data-max="2400" data-val="10">
                    <circle r="42" class="knob-ring-bg"/>
                    <path class="knob-ring-val" d="M0,-42 A42,42 0 1,1 -0.1,-42" stroke-dasharray="264" stroke-dashoffset="264"/>
                    <use href="#knob-asset"/>
                    <text y="55" fill="#888" text-anchor="middle" font-size="14" font-family="monospace">DETUNE</text>
                </g>

                <!-- Bottom Panel Knobs (Filter & Env) -->
                <!-- Knob 4: Cutoff -->
                <g class="control-interactive" id="knob-cutoff" transform="translate(140, 1000)" data-param="cutoff" data-min="20" data-max="10000" data-val="2000" data-log="true">
                    <circle r="42" class="knob-ring-bg"/>
                    <path class="knob-ring-val" d="M0,-42 A42,42 0 1,1 -0.1,-42" stroke-dasharray="264" stroke-dashoffset="100"/>
                    <use href="#knob-asset"/>
                    <text y="55" fill="#888" text-anchor="middle" font-size="14" font-family="monospace">CUTOFF</text>
                </g>

                <!-- Knob 5: Resonance -->
                <g class="control-interactive" id="knob-res" transform="translate(280, 1000)" data-param="res" data-min="0" data-max="20" data-val="5">
                    <circle r="42" class="knob-ring-bg"/>
                    <path class="knob-ring-val" d="M0,-42 A42,42 0 1,1 -0.1,-42" stroke-dasharray="264" stroke-dashoffset="200"/>
                    <use href="#knob-asset"/>
                    <text y="55" fill="#888" text-anchor="middle" font-size="14" font-family="monospace">RES</text>
                </g>

                <!-- Knob 6: Color Mix -->
                <g class="control-interactive" id="knob-mix" transform="translate(420, 1000)" data-param="mix" data-min="0" data-max="1" data-val="0.5">
                    <circle r="42" class="knob-ring-bg"/>
                    <path class="knob-ring-val color-sync-stroke" d="M0,-42 A42,42 0 1,1 -0.1,-42" stroke-dasharray="264" stroke-dashoffset="132"/>
                    <use href="#knob-asset"/>
                    <text y="55" fill="#888" text-anchor="middle" font-size="14" font-family="monospace">COLOR AMT</text>
                </g>

                <!-- Knob 7: Release -->
                <g class="control-interactive" id="knob-rel" transform="translate(560, 1000)" data-param="release" data-min="0.1" data-max="5" data-val="1">
                    <circle r="42" class="knob-ring-bg"/>
                    <path class="knob-ring-val" d="M0,-42 A42,42 0 1,1 -0.1,-42" stroke-dasharray="264" stroke-dashoffset="200"/>
                    <use href="#knob-asset"/>
                    <text y="55" fill="#888" text-anchor="middle" font-size="14" font-family="monospace">DECAY</text>
                </g>
            </g>

            <!-- LEDs -->
            <circle id="led-gate" cx="50" cy="700" r="8" fill="#333" stroke="#111"/>
            <circle id="led-lfo" cx="50" cy="730" r="8" fill="#333" stroke="#111"/>

        </svg>

        <div id="overlay">
            <h1>PRISMATIC CORE</h1>
            <button id="init-btn">INITIALIZE SYSTEM</button>
            <p style="margin-top:20px; color: #888; font-size: 0.9rem;">
                WARNING: HIGH INTENSITY AUDIO-VISUAL OUTPUT<br>
                USE HEADPHONES
            </p>
        </div>
    </div>

    <script>
        /**
         * MSS: Prismatic Synthesis Engine
         * 
         * Architecture:
         * - Osc 1: Morphing Carrier (Tri -> Saw -> Square)
         * - Osc 2: Sub/Harmonic Detuner
         * - Osc 3: "Color" Modulator (Freq derived from Hue)
         * - Filter: Dual SVF with Hue-dependent routing
         * - Effects: Stereo Delay + Drive
         */

        const AudioState = {
            ctx: null,
            active: false,
            width: 0, height: 0,
            
            // Nodes
            master: null,
            limiter: null,
            analyser: null,
            osc1: null,
            osc2: null,
            oscColor: null,
            filter: null,
            gainEnv: null,
            delayL: null,
            delayR: null,
            shaper: null,
            lfo: null,
            
            // Parameters
            params: {
                prism: 200,   // Hue (0-360)
                shape: 0,     // 0=Tri, 0.5=Saw, 1=Square
                detune: 10,   // Cents
                cutoff: 2000, // Hz
                res: 5,       // Q
                mix: 0.5,     // Color Osc Mix / Drive
                release: 1,   // Seconds
                vol: 0.8
            },

            // Interaction
            touch: { x: 0.5, y: 0.5, active: false },
            
            // Visuals
            analyserBuffer: null,
            canvasCtx: null
        };

        // --- Utility ---
        const clamp = (v, min, max) => Math.min(Math.max(v, min), max);
        const map = (v, iMin, iMax, oMin, oMax) => oMin + (oMax - oMin) * ((v - iMin) / (iMax - iMin));
        
        // Custom WaveShaper Curve for "Prism" saturation
        const makeSaturationCurve = (k) => {
            const n_samples = 44100;
            const curve = new Float32Array(n_samples);
            const deg = Math.PI / 180;
            for (let i = 0; i < n_samples; ++i) {
                let x = i * 2 / n_samples - 1;
                curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
            }
            return curve;
        };

        // --- Audio Engine ---
        const initAudio = () => {
            const AC = window.AudioContext || window.webkitAudioContext;
            AudioState.ctx = new AC();
            const ctx = AudioState.ctx;
            const t = ctx.currentTime;

            // Master Chain
            AudioState.limiter = ctx.createDynamicsCompressor();
            AudioState.master = ctx.createGain();
            AudioState.analyser = ctx.createAnalyser();
            AudioState.analyser.fftSize = 2048;
            AudioState.analyserBuffer = new Uint8Array(AudioState.analyser.frequencyBinCount);

            // Oscillators
            AudioState.osc1 = ctx.createOscillator(); // Main
            AudioState.osc1.type = 'sawtooth';
            
            AudioState.osc2 = ctx.createOscillator(); // Sub/Harmonic
            AudioState.osc2.type = 'square';

            AudioState.oscColor = ctx.createOscillator(); // Color Modulator
            AudioState.oscColor.type = 'sine';

            // Filter & Shaping
            AudioState.filter = ctx.createBiquadFilter();
            AudioState.filter.type = 'lowpass';
            
            AudioState.shaper = ctx.createWaveShaper();
            AudioState.shaper.curve = makeSaturationCurve(10);

            // Envelope
            AudioState.gainEnv = ctx.createGain();
            AudioState.gainEnv.gain.value = 0;

            // Mixing
            const osc1Gain = ctx.createGain();
            const osc2Gain = ctx.createGain();
            const colorGain = ctx.createGain();
            
            // Effects: Stereo Delay
            AudioState.delayL = ctx.createDelay();
            AudioState.delayR = ctx.createDelay();
            const feedL = ctx.createGain();
            const feedR = ctx.createGain();
            const delayOut = ctx.createGain();
            
            AudioState.delayL.delayTime.value = 0.3;
            AudioState.delayR.delayTime.value = 0.4;
            feedL.gain.value = 0.4;
            feedR.gain.value = 0.4;
            delayOut.gain.value = 0.3;

            // LFO
            AudioState.lfo = ctx.createOscillator();
            AudioState.lfo.frequency.value = 2; // Hz
            const lfoGain = ctx.createGain();
            lfoGain.gain.value = 500;
            AudioState.lfo.connect(lfoGain);
            lfoGain.connect(AudioState.filter.frequency);

            // Routing Graph
            // Osc 1 -> Mix
            AudioState.osc1.connect(osc1Gain);
            // Osc 2 -> Mix
            AudioState.osc2.connect(osc2Gain);
            // Color Osc -> FM -> Osc 1 Freq (Cross modulation)
            AudioState.oscColor.connect(colorGain);
            colorGain.connect(AudioState.osc1.frequency);

            // Sum Oscillators
            osc1Gain.connect(AudioState.filter);
            osc2Gain.connect(AudioState.filter);
            
            // Filter -> Shaper -> VCA
            AudioState.filter.connect(AudioState.shaper);
            AudioState.shaper.connect(AudioState.gainEnv);

            // VCA -> Master & Delay
            AudioState.gainEnv.connect(AudioState.master);
            AudioState.gainEnv.connect(AudioState.delayL);
            AudioState.gainEnv.connect(AudioState.delayR);

            // Delay Feedback Loop
            AudioState.delayL.connect(feedL).connect(AudioState.delayL);
            AudioState.delayR.connect(feedR).connect(AudioState.delayR);
            AudioState.delayL.connect(delayOut);
            AudioState.delayR.connect(delayOut);
            delayOut.connect(AudioState.master);

            AudioState.master.connect(AudioState.limiter);
            AudioState.limiter.connect(AudioState.analyser);
            AudioState.analyser.connect(ctx.destination);

            // Start Oscillators
            AudioState.osc1.start(t);
            AudioState.osc2.start(t);
            AudioState.oscColor.start(t);
            AudioState.lfo.start(t);

            // Store References
            AudioState.nodes = {
                osc1Gain, osc2Gain, colorGain, feedL, feedR
            };

            updateSynthParams();
        };

        const updateSynthParams = () => {
            if (!AudioState.ctx) return;
            const p = AudioState.params;
            const t = AudioState.ctx.currentTime + 0.05;

            // 1. Pitch Logic (XY Pad Y-axis)
            // Y: 0 (Top) -> High Pitch, 1 (Bottom) -> Low Pitch
            // We invert this for UI logic usually, but let's map:
            // Top of screen = High Frequency.
            const baseFreq = 60 * Math.pow(2, (1 - AudioState.touch.y) * 5); // 60Hz to ~1920Hz base
            
            // Quantize to scale? Optional. Let's stay continuous for "Theremin" feel.
            AudioState.osc1.frequency.setTargetAtTime(baseFreq, t, 0.1);
            AudioState.osc2.frequency.setTargetAtTime(baseFreq * 0.5, t, 0.1); // Sub octave
            AudioState.osc2.detune.setTargetAtTime(p.detune, t, 0.1);

            // 2. Color/Prism Logic
            // Map Hue (0-360) to audio properties
            // Hue 0 (Red): Aggressive, AM modulation
            // Hue 120 (Green): Ring Mod / FM
            // Hue 240 (Blue): Harmonic Additive
            
            const hueRatio = p.prism / 360;
            const colorFreq = baseFreq * (2 + (hueRatio * 8)); // Harmonic series 2x to 10x
            AudioState.oscColor.frequency.setTargetAtTime(colorFreq, t, 0.1);
            
            // Color Mix controls FM depth
            AudioState.nodes.colorGain.gain.setTargetAtTime(p.mix * 2000 * AudioState.touch.x, t, 0.1);

            // 3. Filter
            AudioState.filter.frequency.setTargetAtTime(p.cutoff, t, 0.1);
            AudioState.filter.Q.setTargetAtTime(p.res, t, 0.1);

            // 4. Waveform Morph (Simulated by mixing or just switching for simplicity in WebAudio basic)
            // Here we just switch for efficiency, but could mix if we had multiple osc nodes.
            if(p.shape < 0.33) AudioState.osc1.type = 'triangle';
            else if(p.shape < 0.66) AudioState.osc1.type = 'sawtooth';
            else AudioState.osc1.type = 'square';

            // 5. Visual Sync
            document.documentElement.style.setProperty('--hue', p.prism);
        };

        const triggerGate = (active) => {
            if (!AudioState.ctx) return;
            const t = AudioState.ctx.currentTime;
            const vca = AudioState.gainEnv.gain;
            const led = document.getElementById('led-gate');

            if (active) {
                // Attack
                vca.cancelScheduledValues(t);
                vca.setValueAtTime(vca.value, t);
                vca.linearRampToValueAtTime(AudioState.params.vol, t + 0.05);
                led.classList.add('led-active');
            } else {
                // Release
                vca.cancelScheduledValues(t);
                vca.setValueAtTime(vca.value, t);
                vca.exponentialRampToValueAtTime(0.001, t + AudioState.params.release);
                led.classList.remove('led-active');
            }
        };

        // --- Visualizer Engine ---
        const drawScope = () => {
            if (!AudioState.active) return;
            requestAnimationFrame(drawScope);

            const canvas = document.getElementById('screen-canvas');
            const ctx = AudioState.canvasCtx;
            const w = canvas.width;
            const h = canvas.height;
            const data = AudioState.analyserBuffer;

            AudioState.analyser.getByteTimeDomainData(data);

            // Fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, w, h);

            ctx.lineWidth = 2;
            ctx.strokeStyle = `hsl(${AudioState.params.prism}, 100%, 60%)`;
            ctx.shadowBlur = 10;
            ctx.shadowColor = `hsl(${AudioState.params.prism}, 100%, 50%)`;
            
            ctx.beginPath();
            const sliceW = w / data.length;
            let x = 0;

            for (let i = 0; i < data.length; i++) {
                const v = data[i] / 128.0; // 0..2
                const y = (v * h / 2); // Center is h/2

                // Add some XY visual feedback distortion
                const jitter = (Math.random() - 0.5) * (AudioState.params.mix * 5);
                
                if (i === 0) ctx.moveTo(x, y + jitter);
                else ctx.lineTo(x, y + jitter);
                x += sliceW;
            }
            ctx.stroke();

            // Draw XY Cursor
            if (AudioState.touch.active) {
                const cx = AudioState.touch.x * w;
                const cy = AudioState.touch.y * h;
                
                ctx.beginPath();
                ctx.arc(cx, cy, 10, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${AudioState.params.prism + 180}, 100%, 80%, 0.8)`;
                ctx.fill();
                
                // Crosshairs
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.moveTo(cx, 0); ctx.lineTo(cx, h);
                ctx.moveTo(0, cy); ctx.lineTo(w, cy);
                ctx.stroke();
            }
        };

        // --- Interaction Setup ---
        const initInteraction = () => {
            // Knobs
            document.querySelectorAll('.control-interactive').forEach(el => {
                const param = el.dataset.param;
                const min = parseFloat(el.dataset.min);
                const max = parseFloat(el.dataset.max);
                const isLog = el.dataset.log === 'true';
                let currentVal = parseFloat(el.dataset.val);
                
                // Update internal state
                AudioState.params[param] = currentVal;

                // Visual update function
                const updateVisual = () => {
                    // Map value to rotation (-135 to 135 deg)
                    let pct;
                    if (isLog) {
                        pct = (Math.log(currentVal) - Math.log(min)) / (Math.log(max) - Math.log(min));
                    } else {
                        pct = (currentVal - min) / (max - min);
                    }
                    const deg = pct * 270 - 135;
                    const dashOffset = 264 * (1 - pct);
                    
                    el.querySelector('use').style.transform = `rotate(${deg}deg)`;
                    const ring = el.querySelector('.knob-ring-val');
                    if (ring) ring.style.strokeDashoffset = dashOffset;
                };
                updateVisual();

                let startY;
                let startVal;

                const onMove = (e) => {
                    const y = e.touches ? e.touches[0].clientY : e.clientY;
                    const delta = (startY - y) * 0.005;
                    
                    let pct;
                    if (isLog) {
                        const startPct = (Math.log(startVal) - Math.log(min)) / (Math.log(max) - Math.log(min));
                        pct = clamp(startPct + delta, 0, 1);
                        currentVal = min * Math.pow(max/min, pct);
                    } else {
                        const startPct = (startVal - min) / (max - min);
                        pct = clamp(startPct + delta, 0, 1);
                        currentVal = min + pct * (max - min);
                    }

                    AudioState.params[param] = currentVal;
                    updateVisual();
                    updateSynthParams();
                };

                const onStart = (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    startY = e.touches ? e.touches[0].clientY : e.clientY;
                    startVal = AudioState.params[param];
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('touchmove', onMove);
                    window.addEventListener('mouseup', onEnd);
                    window.addEventListener('touchend', onEnd);
                };

                const onEnd = () => {
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('touchmove', onMove);
                    window.removeEventListener('mouseup', onEnd);
                    window.removeEventListener('touchend', onEnd);
                };

                el.addEventListener('mousedown', onStart);
                el.addEventListener('touchstart', onStart);
            });

            // Touch Screen (XY Pad)
            const zone = document.getElementById('xy-touch-zone');
            const rect = zone.getBoundingClientRect();
            
            const handleXY = (x, y, start) => {
                const rx = (x - rect.left) / rect.width;
                const ry = (y - rect.top) / rect.height;
                
                AudioState.touch.x = clamp(rx, 0, 1);
                AudioState.touch.y = clamp(ry, 0, 1);
                AudioState.touch.active = true;
                
                if (start) triggerGate(true);
                updateSynthParams();
            };

            const endXY = () => {
                AudioState.touch.active = false;
                triggerGate(false);
            };

            zone.addEventListener('mousedown', e => handleXY(e.clientX, e.clientY, true));
            window.addEventListener('mousemove', e => { if (AudioState.touch.active) handleXY(e.clientX, e.clientY, false) });
            window.addEventListener('mouseup', endXY);

            zone.addEventListener('touchstart', e => handleXY(e.touches[0].clientX, e.touches[0].clientY, true));
            window.addEventListener('touchmove', e => { 
                if (AudioState.touch.active) {
                    e.preventDefault(); // Prevent scroll
                    handleXY(e.touches[0].clientX, e.touches[0].clientY, false);
                }
            }, {passive: false});
            window.addEventListener('touchend', endXY);
        };

        // --- Initialization ---
        document.getElementById('init-btn').addEventListener('click', () => {
            const overlay = document.getElementById('overlay');
            overlay.style.opacity = 0;
            setTimeout(() => overlay.remove(), 600);
            
            // Canvas Setup
            const canvas = document.getElementById('screen-canvas');
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            AudioState.canvasCtx = canvas.getContext('2d');

            initAudio();
            initInteraction();
            AudioState.active = true;
            drawScope();
        });

        // Resize handler
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('screen-canvas');
            if(canvas) {
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
            }
        });

    </script>
</body>
</html>
