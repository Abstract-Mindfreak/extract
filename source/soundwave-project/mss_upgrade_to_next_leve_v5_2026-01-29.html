<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MSS: HYPER-RESONANCE CORE</title>
    <style>
        :root {
            --bg-color: #0d0b0a;
            --panel-color: #1f1b19;
            --screen-bg: #050505;
            --primary: #ff9500;
            --secondary: #00f0ff;
            --text-color: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.05);
            --grid-color: rgba(255, 149, 0, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        #chassis {
            position: relative;
            height: 98vh;
            width: auto;
            aspect-ratio: 723.08 / 1195.18;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            border-radius: 12px;
            background: #000;
        }

        #bg-svg {
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
        }

        /* --- UI Layers --- */
        
        /* Main Screen */
        #screen-layer {
            position: absolute;
            top: 7.1%; left: 8.5%;
            width: 83%; height: 42.5%;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: inset 0 0 30px #000;
            cursor: crosshair;
            z-index: 10;
        }

        #scope-canvas {
            width: 100%; height: 100%;
            image-rendering: pixelated;
        }

        .hud-overlay {
            position: absolute;
            top: 10px; left: 10px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 12px;
            text-shadow: 0 0 2px rgba(0,0,0,0.8);
        }
        .metric-label { color: #666; font-weight: bold; }
        .metric-val { color: var(--primary); font-family: monospace; }
        .metric-unit { color: #888; font-size: 10px; }

        .medium-indicator {
            position: absolute;
            bottom: 10px; right: 10px;
            font-size: 14px;
            color: var(--secondary);
            text-align: right;
            text-shadow: 0 0 5px var(--secondary);
            opacity: 0.8;
        }

        /* Middle Interaction Zone (Harmonics/Sequencer) */
        #mid-panel {
            position: absolute;
            top: 53%; left: 17%;
            width: 65%; height: 26%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 20;
        }

        .seq-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            height: 40px;
        }
        .seq-step {
            background: #222;
            border: 1px solid #333;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.1s;
        }
        .seq-step.active { background: var(--primary); box-shadow: 0 0 8px var(--primary); border-color: #fff; }
        .seq-step.playing { background: #fff; }

        .transport-bar {
            display: flex;
            justify-content: space-between;
            height: 30px;
        }
        .btn-transport {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            font-size: 10px;
            flex: 1;
            margin: 0 2px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-transport.active { color: #000; background: var(--primary); border-color: var(--primary); font-weight: bold; }
        .btn-transport:active { transform: translateY(1px); }

        /* Bottom Controls (Materials & Knobs) */
        #bottom-panel {
            position: absolute;
            bottom: 3.5%; left: 8%;
            width: 84%; height: 28%;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 20;
        }

        .material-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 6px;
            height: 45%;
            padding: 5px;
        }

        .mat-btn {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            color: #555;
            font-size: 9px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            border-radius: 4px;
        }
        .mat-btn:hover { border-color: #666; color: #888; }
        .mat-btn.selected {
            border-color: var(--secondary);
            color: var(--secondary);
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .knob-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 55%;
        }

        .knob-wrap {
            width: 50px; height: 50px;
            position: relative;
            cursor: ns-resize;
        }
        .knob-svg { width: 100%; height: 100%; overflow: visible; }
        .knob-body { fill: #111; stroke: #333; stroke-width: 1; }
        .knob-indicator { fill: none; stroke: var(--primary); stroke-width: 2.5; stroke-linecap: round; }
        .knob-label {
            position: absolute; bottom: -12px; width: 100%;
            text-align: center; font-size: 8px; color: #666;
        }

        /* Overlay */
        #boot-screen {
            position: absolute; inset: 0;
            background: rgba(5,5,5,0.98);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
        }
        .boot-btn {
            padding: 15px 40px;
            border: 1px solid var(--primary);
            color: var(--primary);
            background: transparent;
            font-family: inherit;
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255,149,0,0.2);
        }
        .boot-btn:hover { background: var(--primary); color: #000; }

        .scanline {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 50;
            opacity: 0.3;
        }

    </style>
</head>
<body>

<div id="chassis">
    <!-- SVG Background provided by user -->
    <svg id="bg-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 723.08 1195.18">
      <defs>
          <radialGradient id="screen-glow" cx="0.5" cy="0.5" r="0.5">
              <stop offset="0%" stop-color="#1a1a1a"/>
              <stop offset="100%" stop-color="#000000"/>
          </radialGradient>
      </defs>
      <g id="Layer_2" data-name="Layer 2">
        <g id="Layer_1-2" data-name="Layer 1">
          <rect x="54.83" width="668.25" height="1187.22" style="fill: #1f1b19"/>
          <rect x="54.83" width="212.43" height="1188" style="fill: #1f1b19"/>
          <path d="M594,619.71q0,281.41,0,562.84c0,7-2.56,12.63-5.73,12.63H7a2.15,2.15,0,0,1-.43,0c-8.85-1.44-6.15-3.13-6.15-4.74Q.2,901.13.39,611.87c0-1.6-2.7-3.3,6.14-4.74a3.13,3.13,0,0,1,.43,0H588.27C591.43,607.08,594,612.73,594,619.71Z" style="fill: #151210"/>
          <path d="M594,13.2q0,294,0,588.09c0,7.29-2.56,13.2-5.73,13.2L7,614.47l-.43,0c-8.85-1.51-6.15-3.28-6.15-5Q.2,307.25.39,5c0-1.68-2.7-3.45,6.14-5A3.11,3.11,0,0,1,7,0L588.27,0C591.43,0,594,5.91,594,13.2Z" style="fill: #151210"/>
          <rect x="53.7" y="830.82" width="164.28" height="364.36" rx="11.71" fill="none" stroke="#333" stroke-width="2"/>
          <rect x="61.32" y="85.01" width="655.28" height="508.82" rx="6.8" style="fill: #0f0f0f; stroke: #333; stroke-width: 4;"/>
          <rect x="129.37" y="632.62" width="459.97" height="324.43" rx="11.13" style="fill: #26221e"/>
          <rect x="69.7" y="823.03" width="158.38" height="357.17" rx="11.38" style="fill: #26221e"/>
          <!-- Decorative UI elements from original SVG simplified/darkened for backdrop -->
          <rect x="178.35" y="850.8" width="377.61" height="31.53" style="fill: #333"/>
        </g>
      </g>
    </svg>

    <!-- Screen Area -->
    <div id="screen-layer">
        <canvas id="scope-canvas"></canvas>
        <div class="hud-overlay">
            <div class="metric-row"><span class="metric-label">FREQ:</span><span class="metric-val" id="disp-freq">0.0</span><span class="metric-unit">Hz</span></div>
            <div class="metric-row"><span class="metric-label">NOTE:</span><span class="metric-val" id="disp-note">--</span></div>
            <div class="metric-row"><span class="metric-label">WAVE:</span><span class="metric-val" id="disp-wave">0.00</span><span class="metric-unit">m</span></div>
            <div class="metric-row"><span class="metric-label">TEMP:</span><span class="metric-val" id="disp-temp">20</span><span class="metric-unit">°C</span></div>
        </div>
        <div class="medium-indicator" id="disp-medium">VACUUM</div>
        <div class="scanline"></div>
    </div>

    <!-- Mid Panel: Sequencer -->
    <div id="mid-panel">
        <div class="transport-bar">
            <button class="btn-transport" id="btn-rec">REC PATTERN</button>
            <button class="btn-transport" id="btn-play">PLAY SEQ</button>
            <button class="btn-transport" id="btn-clear">CLR</button>
        </div>
        <div class="seq-grid" id="seq-grid">
            <!-- 16 steps generated -->
        </div>
    </div>

    <!-- Bottom Panel: Mediums & Knobs -->
    <div id="bottom-panel">
        <div class="material-grid">
            <div class="mat-btn selected" data-mat="air0" data-c="331" data-name="AIR 0°C">Air 0°</div>
            <div class="mat-btn" data-mat="air30" data-c="349" data-name="AIR 30°C">Air 30°</div>
            <div class="mat-btn" data-mat="water" data-c="1482" data-name="H2O">Water</div>
            <div class="mat-btn" data-mat="wood" data-c="3500" data-name="WOOD">Wood</div>
            <div class="mat-btn" data-mat="copper" data-c="4600" data-name="Cu">Copper</div>
            <div class="mat-btn" data-mat="iron" data-c="5120" data-name="Fe">Iron</div>
            <div class="mat-btn" data-mat="steel" data-c="5960" data-name="STEEL">Steel</div>
            <div class="mat-btn" data-mat="sapphire" data-c="11100" data-name="Al2O3">Sapphire</div>
        </div>
        
        <div class="knob-row">
            <div class="knob-wrap" data-param="gain" data-min="0" data-max="1" data-val="0.5">
                <svg class="knob-svg" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="40" class="knob-body"/>
                    <path d="M50 50 L50 15" class="knob-indicator" transform="rotate(0, 50, 50)"/>
                </svg>
                <div class="knob-label">AMP</div>
            </div>
            <div class="knob-wrap" data-param="res" data-min="0" data-max="0.95" data-val="0.4">
                <svg class="knob-svg" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="40" class="knob-body"/>
                    <path d="M50 50 L50 15" class="knob-indicator" transform="rotate(0, 50, 50)"/>
                </svg>
                <div class="knob-label">REFLECT</div>
            </div>
            <div class="knob-wrap" data-param="lfo" data-min="0" data-max="20" data-val="2">
                <svg class="knob-svg" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="40" class="knob-body"/>
                    <path d="M50 50 L50 15" class="knob-indicator" transform="rotate(0, 50, 50)"/>
                </svg>
                <div class="knob-label">FLUX</div>
            </div>
        </div>
    </div>

    <!-- Boot Overlay -->
    <div id="boot-screen">
        <h1 style="color:var(--primary); font-weight:lighter; letter-spacing:5px; margin-bottom:30px;">PHYSICAL<br>RESONANCE<br>SYSTEM</h1>
        <button class="boot-btn" id="start-btn">INITIALIZE</button>
    </div>

</div>

<script>
/**
 * MSS: Physical Resonance System
 * Logic:
 * - Audio Engine: Oscillator -> Waveguide Delay (Physical Model) -> Filter -> Output
 * - The Delay Time is determined by the speed of sound in the selected medium over a virtual distance.
 * - Sequencer: Records Step events (Frequency, Gate).
 * - Visuals: Real-time Oscilloscope + HUD Metrics.
 */

const State = {
    ctx: null,
    active: false,
    
    // Nodes
    master: null,
    osc: null,
    oscGain: null,
    delay: null, // Physical waveguide
    feedback: null,
    filter: null,
    analyser: null,
    lfo: null,
    lfoGain: null,

    // Parameters
    params: {
        gain: 0.5,
        res: 0.4, // Feedback amount
        lfo: 2,
        freq: 440,
        mediumC: 331, // Speed of sound m/s
        distance: 2.0, // Virtual distance in meters
        gate: false
    },

    // UI State
    touch: { x: 0, y: 0, active: false },
    sequencer: {
        steps: new Array(16).fill(null), // {freq, active}
        currentStep: 0,
        recording: false,
        playing: false,
        intervalId: null,
        tempo: 250 // ms per step
    },

    // Visuals
    canvas: null,
    cCtx: null,
    width: 0, height: 0
};

// --- Audio Engine ---

const initAudio = () => {
    const AC = window.AudioContext || window.webkitAudioContext;
    State.ctx = new AC();
    const ctx = State.ctx;

    // Master
    State.master = ctx.createGain();
    State.master.gain.value = State.params.gain;
    State.master.connect(ctx.destination);

    // Analyser
    State.analyser = ctx.createAnalyser();
    State.analyser.fftSize = 2048;
    State.analyser.connect(State.master);

    // Physical Modeling Chain (Karplus-Strong-ish)
    // Oscillator -> Gain -> Lowpass -> DelayLine -> Feedback -> Output
    
    // Source
    State.osc = ctx.createOscillator();
    State.osc.type = 'sawtooth';
    State.osc.start();

    State.oscGain = ctx.createGain();
    State.oscGain.gain.value = 0;

    // Filter (Material absorption)
    State.filter = ctx.createBiquadFilter();
    State.filter.type = 'lowpass';
    State.filter.frequency.value = 3000; // Brightness of material

    // Delay (Material resonance)
    State.delay = ctx.createDelay(5.0); // Max 5 sec
    
    // Feedback (Reflection)
    State.feedback = ctx.createGain();
    State.feedback.gain.value = State.params.res;

    // LFO (Flux/Turbulence)
    State.lfo = ctx.createOscillator();
    State.lfo.frequency.value = State.params.lfo;
    State.lfo.start();
    State.lfoGain = ctx.createGain();
    State.lfoGain.gain.value = 0; // Modulate delay time slightly
    State.lfo.connect(State.lfoGain);
    State.lfoGain.connect(State.delay.delayTime);

    // Routing
    // Direct path
    State.osc.connect(State.oscGain);
    State.oscGain.connect(State.filter);
    State.filter.connect(State.delay);
    State.delay.connect(State.feedback);
    State.feedback.connect(State.filter); // Loop
    
    // Output tapping
    State.filter.connect(State.analyser); // Dry-ish
    State.delay.connect(State.analyser); // Wet
    
    // Initial Setting
    updatePhysicalModel();
};

const updatePhysicalModel = () => {
    if(!State.ctx) return;
    const p = State.params;
    const t = State.ctx.currentTime;

    // Calculate Delay Time based on Medium
    // Time = Distance / Speed
    // We add a tiny offset to prevent zero delay
    const delayTime = Math.max(0.0001, p.distance / p.mediumC);
    State.delay.delayTime.setTargetAtTime(delayTime, t, 0.05);

    // Feedback/Resonance
    State.feedback.gain.setTargetAtTime(p.res, t, 0.05);

    // Filter cutoff also scales with material "hardness" roughly
    // Harder materials (High C) reflect high freqs better
    const cutoff = Math.min(20000, p.mediumC * 2 + 500);
    State.filter.frequency.setTargetAtTime(cutoff, t, 0.1);

    // Oscillator Freq
    State.osc.frequency.setTargetAtTime(p.freq, t, 0.02);

    // LFO Rate
    State.lfo.frequency.setTargetAtTime(p.lfo, t, 0.1);
    
    // LFO Depth (Turbulence is higher in slower mediums like air, lower in solids)
    const turbulence = (340 / p.mediumC) * 0.001;
    State.lfoGain.gain.setTargetAtTime(turbulence, t, 0.1);

    // Master Gain
    State.master.gain.setTargetAtTime(p.gain, t, 0.05);
};

const triggerNote = (freq, vel) => {
    if(!State.ctx) return;
    State.params.freq = freq;
    
    // Simple Envelope
    const now = State.ctx.currentTime;
    State.oscGain.gain.cancelScheduledValues(now);
    State.oscGain.gain.setValueAtTime(0, now);
    State.oscGain.gain.linearRampToValueAtTime(vel, now + 0.02);
    State.oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    
    updatePhysicalModel();
};

// --- Logic & Logic ---

const getNoteName = (f) => {
    const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const midi = 12 * Math.log2(f / 440) + 69;
    const n = Math.round(midi);
    const octave = Math.floor(n / 12) - 1;
    const note = notes[n % 12];
    return `${note}${octave}`;
};

const updateMetrics = () => {
    if(!State.ctx) return;
    const f = State.params.freq;
    const c = State.params.mediumC;
    const lambda = c / f; // Wavelength

    document.getElementById('disp-freq').innerText = f.toFixed(1);
    document.getElementById('disp-note').innerText = getNoteName(f);
    document.getElementById('disp-wave').innerText = lambda.toFixed(3);
    
    // Fake Temp calculation based on C for Air, else standard
    let temp = 20;
    if(c === 331) temp = 0;
    if(c === 349) temp = 30;
    document.getElementById('disp-temp').innerText = temp;
};

// --- Sequencer ---

const initSequencer = () => {
    const grid = document.getElementById('seq-grid');
    grid.innerHTML = '';
    for(let i=0; i<16; i++) {
        const step = document.createElement('div');
        step.className = 'seq-step';
        step.dataset.idx = i;
        step.addEventListener('click', () => {
            // Toggle manual step (uses current freq)
            if(State.sequencer.steps[i]) {
                State.sequencer.steps[i] = null;
                step.classList.remove('active');
            } else {
                State.sequencer.steps[i] = { freq: State.params.freq };
                step.classList.add('active');
            }
        });
        grid.appendChild(step);
    }

    document.getElementById('btn-rec').addEventListener('click', (e) => {
        State.sequencer.recording = !State.sequencer.recording;
        e.target.classList.toggle('active');
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
        State.sequencer.steps.fill(null);
        document.querySelectorAll('.seq-step').forEach(s => s.classList.remove('active'));
    });

    document.getElementById('btn-play').addEventListener('click', (e) => {
        State.sequencer.playing = !State.sequencer.playing;
        e.target.classList.toggle('active');
        if(State.sequencer.playing) {
            runSequencer();
        } else {
            clearTimeout(State.sequencer.intervalId);
        }
    });
};

const runSequencer = () => {
    const step = () => {
        if(!State.sequencer.playing) return;
        
        const idx = State.sequencer.currentStep;
        
        // Visuals
        const steps = document.querySelectorAll('.seq-step');
        steps.forEach(s => s.classList.remove('playing'));
        steps[idx].classList.add('playing');

        // Audio
        const data = State.sequencer.steps[idx];
        if(data) {
            triggerNote(data.freq, 0.8);
        }

        // Record Logic
        if(State.sequencer.recording && State.touch.active) {
            State.sequencer.steps[idx] = { freq: State.params.freq };
            steps[idx].classList.add('active');
        }

        State.sequencer.currentStep = (idx + 1) % 16;
        State.sequencer.intervalId = setTimeout(step, State.sequencer.tempo);
    };
    step();
};

// --- Inputs ---

const initInputs = () => {
    // Canvas Pad
    const canvas = document.getElementById('scope-canvas');
    const handleXY = (x, y, active) => {
        const rect = canvas.getBoundingClientRect();
        const nx = Math.max(0, Math.min(1, (x - rect.left) / rect.width));
        const ny = Math.max(0, Math.min(1, (y - rect.top) / rect.height));
        
        State.touch.active = active;
        if(active) {
            // Map Y to Frequency (Exp scale)
            const minF = 50, maxF = 2000;
            const f = minF * Math.pow(maxF/minF, 1 - ny);
            State.params.freq = f;
            
            // Map X to something? Maybe LFO rate or fine tune
            // Let's make X modulate LFO rate for "Flux"
            State.params.lfo = nx * 20;

            if(!State.sequencer.playing) {
                // Continuous drone or retrigger? 
                // Let's retrigger if it's a new press, else slide
                const now = State.ctx.currentTime;
                State.oscGain.gain.setTargetAtTime(0.8, now, 0.05);
            }
            updatePhysicalModel();
            updateMetrics();
        } else {
            if(!State.sequencer.playing) {
                const now = State.ctx.currentTime;
                State.oscGain.gain.setTargetAtTime(0, now, 0.1);
            }
        }
    };

    canvas.addEventListener('mousedown', e => handleXY(e.clientX, e.clientY, true));
    window.addEventListener('mousemove', e => { if(State.touch.active) handleXY(e.clientX, e.clientY, true) });
    window.addEventListener('mouseup', () => handleXY(0,0,false));
    
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        handleXY(e.touches[0].clientX, e.touches[0].clientY, true);
    }, {passive:false});
    window.addEventListener('touchmove', e => {
        if(State.touch.active) {
            e.preventDefault();
            handleXY(e.touches[0].clientX, e.touches[0].clientY, true);
        }
    }, {passive:false});
    window.addEventListener('touchend', () => handleXY(0,0,false));

    // Materials
    document.querySelectorAll('.mat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mat-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            State.params.mediumC = parseFloat(btn.dataset.c);
            document.getElementById('disp-medium').innerText = btn.dataset.name;
            updatePhysicalModel();
            updateMetrics();
        });
    });

    // Knobs
    document.querySelectorAll('.knob-wrap').forEach(k => {
        const param = k.dataset.param;
        const min = parseFloat(k.dataset.min);
        const max = parseFloat(k.dataset.max);
        let val = parseFloat(k.dataset.val);
        
        const update = () => {
            const pct = (val - min) / (max - min);
            const deg = pct * 270 - 135;
            k.querySelector('.knob-indicator').setAttribute('transform', `rotate(${deg}, 50, 50)`);
            State.params[param] = val;
            updatePhysicalModel();
        };
        update();

        let startY, startVal;
        const move = (e) => {
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            const delta = (startY - y) * 0.005;
            val = Math.max(min, Math.min(max, startVal + delta * (max - min)));
            update();
        };
        const start = (e) => {
            startY = e.touches ? e.touches[0].clientY : e.clientY;
            startVal = val;
            window.addEventListener('mousemove', move);
            window.addEventListener('touchmove', move);
            window.addEventListener('mouseup', end);
            window.addEventListener('touchend', end);
        };
        const end = () => {
            window.removeEventListener('mousemove', move);
            window.removeEventListener('touchmove', move);
            window.removeEventListener('mouseup', end);
            window.removeEventListener('touchend', end);
        };
        k.addEventListener('mousedown', start);
        k.addEventListener('touchstart', start);
    });
};

// --- Visuals ---

const initVisuals = () => {
    State.canvas = document.getElementById('scope-canvas');
    State.cCtx = State.canvas.getContext('2d');
    
    const resize = () => {
        State.canvas.width = State.canvas.clientWidth;
        State.canvas.height = State.canvas.clientHeight;
        State.width = State.canvas.width;
        State.height = State.canvas.height;
    };
    window.addEventListener('resize', resize);
    resize();
    
    draw();
};

const draw = () => {
    requestAnimationFrame(draw);
    if(!State.active) return;
    
    const ctx = State.cCtx;
    const w = State.width;
    const h = State.height;
    
    // Clear
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(0, 0, w, h);

    // Get Data
    const data = new Uint8Array(State.analyser.frequencyBinCount);
    State.analyser.getByteTimeDomainData(data);

    // Draw Wave
    ctx.lineWidth = 2;
    // Color depends on medium speed (Red=Slow/Hot, Blue=Fast/Cold)
    // Map 331..11000 to Hue
    const c = State.params.mediumC;
    const hue = Math.min(240, Math.max(0, (Math.log10(c) - 2.5) * 120)); 
    ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
    ctx.shadowBlur = 10;
    ctx.shadowColor = ctx.strokeStyle;

    ctx.beginPath();
    const slice = w / data.length;
    let x = 0;
    for(let i=0; i<data.length; i++) {
        const v = data[i] / 128.0;
        const y = v * h/2;
        if(i===0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
        x += slice;
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Draw Grid (Wavelength visualization)
    // Draw vertical lines spaced by lambda (scaled)
    // Lambda 1m = 50px
    const lambda = State.params.mediumC / Math.max(1, State.params.freq);
    const pxPerMeter = 50; 
    const gap = lambda * pxPerMeter;
    
    if(gap > 5 && gap < w) {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for(let gx = (Date.now()/10 % gap); gx < w; gx += gap) {
            ctx.moveTo(gx, 0); ctx.lineTo(gx, h);
        }
        ctx.stroke();
    }
    
    // Touch indicator
    if(State.touch.active) {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        // Map Freq back to Y
        const minF = 50, maxF = 2000;
        const ny = 1 - (Math.log(State.params.freq/minF) / Math.log(maxF/minF));
        ctx.arc(w/2, ny * h, 4, 0, Math.PI*2);
        ctx.fill();
    }
};

// --- Boot ---

document.getElementById('start-btn').addEventListener('click', () => {
    initAudio();
    initInputs();
    initSequencer();
    initVisuals();
    State.active = true;
    
    const boot = document.getElementById('boot-screen');
    boot.style.opacity = 0;
    setTimeout(() => boot.remove(), 500);
});

</script>
