<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSS: Autonomous Synthesis Module</title>
    <style>
        :root {
            --bg-color: #12100e;
            --glow-color: rgba(255, 125, 111, 0.4);
            --accent-gold: #ffd500;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #555;
        }

        #synth-container {
            position: relative;
            height: 95vh;
            width: auto;
            aspect-ratio: 723.08 / 1195.18;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.8));
            opacity: 0;
            animation: bootUp 2s ease-out forwards;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* Interactive Elements */
        .knob-group {
            cursor: grab;
            transform-box: fill-box;
            transform-origin: center;
            transition: filter 0.2s;
        }

        .knob-group:hover {
            filter: drop-shadow(0 0 5px var(--accent-gold));
        }

        .knob-group:active {
            cursor: grabbing;
        }

        /* Meter Visualization */
        .meter-segment {
            transition: opacity 0.05s linear;
            mix-blend-mode: screen;
        }

        /* Status Lights */
        .status-light {
            fill: #302b27;
            transition: fill 0.2s, filter 0.2s;
        }

        .status-light.active {
            fill: #ff3a25;
            filter: drop-shadow(0 0 8px #ff3a25);
        }

        .power-light {
            fill: #1f1b19;
            transition: fill 1s;
        }
        .power-light.on {
            fill: #ffd500;
            filter: drop-shadow(0 0 10px #ffd500);
        }

        /* UI Overlay */
        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        #start-btn {
            pointer-events: auto;
            background: transparent;
            border: 1px solid #ff7d6f;
            color: #ff7d6f;
            padding: 15px 30px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0,0,0,0.7);
        }

        #start-btn:hover {
            background: #ff7d6f;
            color: #1f1b19;
            box-shadow: 0 0 20px var(--glow-color);
        }

        @keyframes bootUp {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

    <script>
        // --- System State & Configuration ---
        const State = {
            audioContext: null,
            isPlaying: false,
            knobs: {
                'knob-1': { value: 0.5, min: 0, max: 1, param: 'gain' },       // Volume
                'knob-2': { value: 0.5, min: 200, max: 2000, param: 'freq' },  // Filter Freq
                'knob-3': { value: 0.2, min: 0, max: 20, param: 'res' },       // Resonance
                'knob-4': { value: 0.0, min: 0, max: 10, param: 'lfo' },       // LFO Rate
                'knob-5': { value: 0.5, min: 0, max: 1, param: 'detune' }      // Detune
            },
            analyser: null,
            nodes: {},
            animationFrame: null
        };

        // --- Audio Engine ---
        const initAudio = () => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            State.audioContext = new AudioContext();
            
            // Create Nodes
            State.nodes.masterGain = State.audioContext.createGain();
            State.nodes.filter = State.audioContext.createBiquadFilter();
            State.nodes.analyser = State.audioContext.createAnalyser();
            State.nodes.lfo = State.audioContext.createOscillator();
            State.nodes.lfoGain = State.audioContext.createGain();
            State.nodes.osc1 = State.audioContext.createOscillator();
            State.nodes.osc2 = State.audioContext.createOscillator();
            
            // Configuration
            State.nodes.analyser.fftSize = 64;
            State.nodes.filter.type = 'lowpass';
            State.nodes.osc1.type = 'sawtooth';
            State.nodes.osc2.type = 'square';
            State.nodes.lfo.type = 'sine';

            // Routing
            // LFO -> Filter Frequency
            State.nodes.lfo.connect(State.nodes.lfoGain);
            State.nodes.lfoGain.connect(State.nodes.filter.frequency);

            // Oscillators -> Filter -> Master -> Output
            State.nodes.osc1.connect(State.nodes.filter);
            State.nodes.osc2.connect(State.nodes.filter);
            State.nodes.filter.connect(State.nodes.masterGain);
            State.nodes.masterGain.connect(State.nodes.analyser);
            State.nodes.analyser.connect(State.audioContext.destination);

            // Initial Start
            State.nodes.osc1.start();
            State.nodes.osc2.start();
            State.nodes.lfo.start();
            
            // Apply initial knob values
            updateAudioParams();
        };

        const updateAudioParams = () => {
            if (!State.audioContext) return;
            const t = State.audioContext.currentTime;

            // Master Volume
            State.nodes.masterGain.gain.setTargetAtTime(State.knobs['knob-1'].value * 0.5, t, 0.1);

            // Filter Frequency & Resonance
            const freq = State.knobs['knob-2'].min + (State.knobs['knob-2'].max - State.knobs['knob-2'].min) * State.knobs['knob-2'].value;
            State.nodes.filter.frequency.setTargetAtTime(freq, t, 0.1);
            State.nodes.filter.Q.setTargetAtTime(State.knobs['knob-3'].value * 20, t, 0.1);

            // LFO Rate & Depth
            const lfoRate = State.knobs['knob-4'].value * 10;
            State.nodes.lfo.frequency.setTargetAtTime(lfoRate, t, 0.1);
            State.nodes.lfoGain.gain.setTargetAtTime(lfoRate > 0.1 ? 500 : 0, t, 0.1);

            // Oscillator Detune
            const detune = (State.knobs['knob-5'].value - 0.5) * 100; // +/- 50 cents
            State.nodes.osc1.frequency.setTargetAtTime(110, t, 0.1); // A2 base
            State.nodes.osc2.frequency.setTargetAtTime(110, t, 0.1);
            State.nodes.osc2.detune.setTargetAtTime(detune, t, 0.1);
        };

        // --- Interaction Logic ---
        const setupInteractions = () => {
            const knobs = document.querySelectorAll('.knob-group');
            let activeKnob = null;
            let startY = 0;
            let startVal = 0;

            knobs.forEach(knob => {
                // Initialize Rotation
                const id = knob.id;
                const initialRotation = (State.knobs[id].value * 270) - 135;
                knob.style.transform = `rotate(${initialRotation}deg)`;

                knob.addEventListener('mousedown', (e) => {
                    activeKnob = knob;
                    startY = e.clientY;
                    startVal = State.knobs[id].value;
                    document.body.style.cursor = 'grabbing';
                });

                // Touch support
                knob.addEventListener('touchstart', (e) => {
                    activeKnob = knob;
                    startY = e.touches[0].clientY;
                    startVal = State.knobs[id].value;
                    e.preventDefault();
                });
            });

            const handleMove = (clientY) => {
                if (!activeKnob) return;
                
                const delta = (startY - clientY) * 0.005; // Sensitivity
                let newVal = startVal + delta;
                newVal = Math.max(0, Math.min(1, newVal)); // Clamp 0-1
                
                State.knobs[activeKnob.id].value = newVal;
                
                // Visual Update
                const rotation = (newVal * 270) - 135; // -135deg to +135deg
                activeKnob.style.transform = `rotate(${rotation}deg)`;

                // Audio Update
                updateAudioParams();
            };

            document.addEventListener('mousemove', (e) => handleMove(e.clientY));
            document.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientY));

            const endInteraction = () => {
                activeKnob = null;
                document.body.style.cursor = 'default';
            };

            document.addEventListener('mouseup', endInteraction);
            document.addEventListener('touchend', endInteraction);
        };

        // --- Visualization Loop ---
        const visualizerLoop = () => {
            if (!State.isPlaying) return;
            
            const bufferLength = State.nodes.analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            State.nodes.analyser.getByteFrequencyData(dataArray);

            // Animate Spectrum Segments
            const segments = document.querySelectorAll('.meter-segment');
            const step = Math.floor(bufferLength / segments.length);

            segments.forEach((seg, i) => {
                const value = dataArray[i * step];
                const opacity = Math.max(0.2, value / 255);
                seg.style.opacity = opacity;
                
                // Dynamic glow based on volume
                if (value > 200) {
                    seg.style.filter = "url(#glow)";
                } else {
                    seg.style.filter = "none";
                }
            });

            // Animate Status Lights
            const lfoVal = State.knobs['knob-4'].value;
            if (lfoVal > 0.1) {
                const time = Date.now() / 1000;
                const blink = Math.sin(time * lfoVal * 10) > 0;
                document.getElementById('light-1').classList.toggle('active', blink);
                document.getElementById('light-2').classList.toggle('active', !blink);
            } else {
                 document.getElementById('light-1').classList.add('active');
                 document.getElementById('light-2').classList.remove('active');
            }

            State.animationFrame = requestAnimationFrame(visualizerLoop);
        };

        // --- Initialization ---
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            document.querySelector('.power-light').classList.add('on');
            
            initAudio();
            setupInteractions();
            State.isPlaying = true;
            visualizerLoop();
        });

    </script>
