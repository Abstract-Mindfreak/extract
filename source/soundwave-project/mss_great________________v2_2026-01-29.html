<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MSS: Chromatic Synthesis Core</title>
    <style>
        :root {
            --base-hue: 35;
            --bg-dark: #12100e;
            --bg-panel: #1f1b19;
            --primary: hsl(var(--base-hue), 100%, 50%);
            --glow: hsla(var(--base-hue), 100%, 60%, 0.6);
            --off-state: #302b27;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            user-select: none;
            touch-action: none;
        }

        #synth-wrapper {
            position: relative;
            height: 96vh;
            width: auto;
            aspect-ratio: 723.08 / 1195.18;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.9));
            transition: transform 0.1s cubic-bezier(0.1, 0.7, 1.0, 0.1);
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* --- Interactive Components --- */
        .knob-group {
            cursor: grab;
            transform-box: fill-box;
            transform-origin: center;
            transition: filter 0.2s;
        }
        .knob-group:active { cursor: grabbing; }
        .knob-group:hover { filter: drop-shadow(0 0 5px var(--primary)); }

        /* Dynamic coloring for SVG parts */
        .dynamic-fill { fill: var(--primary); transition: fill 0.2s ease; }
        .dynamic-stroke { stroke: var(--primary); transition: stroke 0.2s ease; }
        
        .meter-segment {
            transition: opacity 0.05s linear, fill 0.2s ease;
            mix-blend-mode: screen;
            fill: var(--off-state);
        }
        .meter-segment.lit {
            fill: var(--primary);
            filter: drop-shadow(0 0 8px var(--glow));
        }

        /* Top Screen Oscilloscope */
        #oscilloscope-canvas {
            position: absolute;
            top: 7.1%;
            left: 8.5%;
            width: 83%;
            height: 42.5%;
            pointer-events: auto; /* Active for touch */
            cursor: crosshair;
            opacity: 0.8;
            border-radius: 6px;
            mix-blend-mode: screen;
        }

        /* Lights */
        .status-light {
            fill: var(--off-state);
            transition: fill 0.1s, filter 0.1s;
        }
        .status-light.active {
            fill: var(--primary);
            filter: drop-shadow(0 0 10px var(--primary));
        }

        /* Overlay UI */
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
            transition: opacity 0.5s;
        }
        
        button {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 20px 40px;
            font-size: 1.5rem;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px var(--glow);
        }
        button:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 40px var(--glow);
        }

        .info-text {
            color: #888;
            margin-top: 20px;
            font-size: 0.8rem;
            text-align: center;
            line-height: 1.5;
        }
        
        /* XY Pad Feedback */
        #xy-cursor {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0;
            box-shadow: 0 0 10px var(--primary);
            transition: opacity 0.2s;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            100% { opacity: 0.8; }
        }
    </style>
</head>

    <script>
        /**
         * MSS: Autonomous Synthesis Module - Version 2.0
         * Features: Chromatic Audio Mapping, XY Pad Oscilloscope, FM Synthesis
         */
        
        const State = {
            ctx: null,
            active: false,
            hue: 35, // Base Gold
            w: 0, h: 0,
            nodes: {},
            knobs: {
                'knob-vol':  { val: 0.6, min: 0, max: 1 },
                'knob-freq': { val: 0.4, min: 50, max: 3000, log: true },
                'knob-res':  { val: 0.3, min: 0, max: 20 },
                'knob-lfo':  { val: 0.1, min: 0.1, max: 15 },
                'knob-fm':   { val: 0.0, min: 0, max: 1000 }
            },
            xy: { x: 0.5, y: 0.5 }, // Top screen pad state
            analyserBuffer: null
        };

        // --- Audio Engine ---
        const initAudio = () => {
            const AC = window.AudioContext || window.webkitAudioContext;
            State.ctx = new AC();
            const now = State.ctx.currentTime;

            // Master Chain
            const master = State.ctx.createGain();
            const limiter = State.ctx.createDynamicsCompressor();
            const analyser = State.ctx.createAnalyser();
            
            analyser.fftSize = 256; // Smaller FFT for faster visuals
            State.analyserBuffer = new Uint8Array(analyser.frequencyBinCount);

            // Synth Voice
            // Osc 1 (Carrier) - Sawtooth morphing to Square via Shaper? Or just Saw
            const osc1 = State.ctx.createOscillator();
            osc1.type = 'sawtooth';

            // Osc 2 (Modulator) - Sine for FM
            const osc2 = State.ctx.createOscillator();
            osc2.type = 'sine';
            const fmGain = State.ctx.createGain();

            // Filter
            const filter = State.ctx.createBiquadFilter();
            filter.type = 'lowpass';

            // Distortion (Color Dependent)
            const shaper = State.ctx.createWaveShaper();
            shaper.curve = makeDistortionCurve(0); // Init none
            
            // LFO
            const lfo = State.ctx.createOscillator();
            const lfoGain = State.ctx.createGain();
            lfo.type = 'triangle';

            // Routing: LFO -> Filter
            lfo.connect(lfoGain);
            lfoGain.connect(filter.frequency);

            // Routing: FM -> Carrier Freq
            osc2.connect(fmGain);
            fmGain.connect(osc1.frequency);

            // Routing: Carrier -> Filter -> Shaper -> Master
            osc1.connect(filter);
            filter.connect(shaper);
            shaper.connect(master);
            master.connect(limiter);
            limiter.connect(analyser);
            analyser.connect(State.ctx.destination);

            // Start
            osc1.start(now);
            osc2.start(now);
            lfo.start(now);

            // Save Refs
            State.nodes = { master, filter, osc1, osc2, fmGain, lfo, lfoGain, shaper, analyser };
            
            updateAudio();
        };

        const makeDistortionCurve = (amount) => {
            const k = typeof amount === 'number' ? amount : 50;
            const n_samples = 44100;
            const curve = new Float32Array(n_samples);
            const deg = Math.PI / 180;
            for (let i = 0; i < n_samples; ++i) {
                let x = i * 2 / n_samples - 1;
                curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
            }
            return curve;
        };

        const updateAudio = () => {
            if (!State.ctx) return;
            const t = State.ctx.currentTime + 0.05;
            const k = State.knobs;

            // Volume
            State.nodes.master.gain.setTargetAtTime(k['knob-vol'].val * 0.5, t, 0.1);

            // Filter (Logarithmic mapping for Freq)
            const cutoff = k['knob-freq'].min * Math.pow(k['knob-freq'].max / k['knob-freq'].min, k['knob-freq'].val);
            State.nodes.filter.frequency.setTargetAtTime(cutoff, t, 0.1);
            State.nodes.filter.Q.setTargetAtTime(k['knob-res'].val, t, 0.1);

            // LFO
            State.nodes.lfo.frequency.setTargetAtTime(k['knob-lfo'].val, t, 0.1);
            State.nodes.lfoGain.gain.setTargetAtTime(cutoff * 0.3, t, 0.1); // LFO depth relative to cutoff

            // FM
            const fmAmount = k['knob-fm'].val * 2; // Ratio multiplier
            State.nodes.osc2.frequency.setTargetAtTime(110 * (State.xy.y * 2 + 0.5), t, 0.1); // Modulator pitch from Y-axis
            State.nodes.fmGain.gain.setTargetAtTime(k['knob-fm'].val * 500, t, 0.1);

            // Carrier Pitch & Color Influence
            // X-axis controls Hue/Timbre
            // Low X (Red): High Distortion, Detuned Saw
            // High X (Blue): Clean, Sine-ish
            
            const basePitch = 55 + (State.xy.y * 220); // Pitch controlled by Y pad mainly
            State.nodes.osc1.frequency.setTargetAtTime(basePitch, t, 0.1);
            
            // Color/Timbre Mapping
            const distortionAmt = (1 - State.xy.x) * 100; // Left = Distorted
            State.nodes.shaper.curve = makeDistortionCurve(distortionAmt);
            
            // Hue Calculation
            // Map X (0-1) to Hue (0-280)
            const targetHue = State.xy.x * 280;
            State.hue = targetHue;
            document.documentElement.style.setProperty('--base-hue', State.hue);
        };

        // --- Interaction ---
        const setupInteractions = () => {
            // Knobs
            document.querySelectorAll('.knob-group').forEach(el => {
                let startY, startVal;
                const id = el.id;
                
                // Set initial rotation
                const norm = State.knobs[id].val;
                el.style.transform = `rotate(${norm * 270 - 135}deg)`;

                const startDrag = (y) => {
                    startY = y;
                    startVal = State.knobs[id].val;
                    document.body.style.cursor = 'grabbing';
                };

                const moveDrag = (y) => {
                    if (startY === undefined) return;
                    const delta = (startY - y) * 0.005;
                    let newVal = Math.max(0, Math.min(1, startVal + delta));
                    State.knobs[id].val = newVal;
                    el.style.transform = `rotate(${newVal * 270 - 135}deg)`;
                    updateAudio();
                };

                const endDrag = () => {
                    startY = undefined;
                    document.body.style.cursor = 'default';
                };

                el.addEventListener('mousedown', e => { e.stopPropagation(); startDrag(e.clientY); });
                el.addEventListener('touchstart', e => { e.stopPropagation(); startDrag(e.touches[0].clientY); });
                
                window.addEventListener('mousemove', e => moveDrag(e.clientY));
                window.addEventListener('touchmove', e => moveDrag(e.touches[0].clientY));
                window.addEventListener('mouseup', endDrag);
                window.addEventListener('touchend', endDrag);
            });

            // XY Pad (Oscilloscope Canvas)
            const canvas = document.getElementById('oscilloscope-canvas');
            const cursor = document.getElementById('xy-cursor');
            
            const updateXY = (cx, cy) => {
                const rect = canvas.getBoundingClientRect();
                const x = Math.max(0, Math.min(1, (cx - rect.left) / rect.width));
                const y = Math.max(0, Math.min(1, 1 - (cy - rect.top) / rect.height)); // Invert Y so up is high pitch
                
                State.xy = { x, y };
                
                // Visual Cursor
                cursor.style.left = (cx) + 'px';
                cursor.style.top = (cy) + 'px';
                cursor.style.opacity = 1;
                
                updateAudio();
            };

            const handlePad = (e) => {
                e.preventDefault();
                const touch = e.touches ? e.touches[0] : e;
                updateXY(touch.clientX, touch.clientY);
            };

            canvas.addEventListener('mousedown', e => {
                handlePad(e);
                canvas.addEventListener('mousemove', handlePad);
            });
            canvas.addEventListener('touchstart', e => {
                handlePad(e);
                canvas.addEventListener('touchmove', handlePad);
            });

            const stopPad = () => {
                canvas.removeEventListener('mousemove', handlePad);
                canvas.removeEventListener('touchmove', handlePad);
                cursor.style.opacity = 0;
            };
            window.addEventListener('mouseup', stopPad);
            window.addEventListener('touchend', stopPad);
        };

        // --- Visualizer ---
        const drawVisuals = () => {
            if (!State.active) return;
            requestAnimationFrame(drawVisuals);

            // 1. Oscilloscope
            const canvas = document.getElementById('oscilloscope-canvas');
            const ctx = canvas.getContext('2d');
            
            // Resize if needed
            if (canvas.width !== canvas.clientWidth) {
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
            }

            State.nodes.analyser.getByteTimeDomainData(State.analyserBuffer);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 2;
            ctx.strokeStyle = `hsl(${State.hue}, 100%, 70%)`;
            ctx.shadowBlur = 10;
            ctx.shadowColor = `hsl(${State.hue}, 100%, 50%)`;
            ctx.beginPath();

            const sliceWidth = canvas.width / State.analyserBuffer.length;
            let x = 0;

            for (let i = 0; i < State.analyserBuffer.length; i++) {
                const v = State.analyserBuffer[i] / 128.0;
                const y = v * canvas.height / 2;

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);

                x += sliceWidth;
            }
            ctx.stroke();

            // 2. Meter Segments (Spectrum)
            const segments = document.querySelectorAll('.meter-segment');
            const freqData = new Uint8Array(State.nodes.analyser.frequencyBinCount);
            State.nodes.analyser.getByteFrequencyData(freqData);

            // Map frequency bands to segments
            const step = Math.floor(freqData.length / segments.length);
            segments.forEach((seg, i) => {
                const val = freqData[i * step];
                if (val > 100) {
                    seg.classList.add('lit');
                    // Dynamic opacity based on volume
                    seg.style.opacity = val / 255; 
                } else {
                    seg.classList.remove('lit');
                    seg.style.opacity = 0.2;
                }
            });

            // 3. Status Lights (LFO Blink)
            const lfoVal = Math.sin(State.ctx.currentTime * State.knobs['knob-lfo'].val * 5);
            document.getElementById('light-1').classList.toggle('active', lfoVal > 0);
            document.getElementById('light-2').classList.toggle('active', lfoVal < 0);
        };

        // --- Boot ---
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('overlay').style.opacity = 0;
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 500);
            
            initAudio();
            setupInteractions();
            State.active = true;
            drawVisuals();
        });

    </script>
</body>
</html>
