# MMSS Fine-tuning Dataset Pipeline Configuration
# Target: Gemma 4 E2B via Kaggle + Unsloth

output_root: "D:/WORK/CLIENTS/extract/prepare-for-fine-tuning-dataset-kaggle-gemma/ready-for-dataset2"
staging_root: "data/fine-tuning/staging2"
reports_dir: "data/fine-tuning/reports2"

source_roots:
  - path: "D:/WORK/CLIENTS/extract/scripts/new-dataset"
    label: "MMSS-dataset"
    priority: 1
  - path: "D:/WORK/CLIENTS/extract/scripts/extra-data-for-split"
    label: "extra-data-split"
    priority: 2
  # - path: "D:/WORK/CLIENTS/extract/prepare-for-fine-tuning-dataset-kaggle-gemma2"
  #   label: "extract-prep"
  #   priority: 3

categories:
  mmss-universal:
  mmss-sound-craft:
  categories:

almost_ready_subdir: "almost_ready"

extensions:
  text: [".md", ".txt", ".py", ".json", ".yaml", ".yml"]
  skip_dirs:
    - ".git"
    - "__pycache__"
    - "node_modules"
    - ".venv"
    - "venv"
    

mmss_builder_paths:
  packages: "packages"
  blocks: "data/prompts/database/blocks"
  generated_blocks: "data/prompts/database/system/generated_blocks"
  stored_prompts: "data/prompts"
  engines:
    - "mmss_core/fractal_reassembly.py"
    - "mmss_core/temporal_navigator.py"
    - "mmss_core/context_weaver.py"
    - "mmss_core/prompt_generator.py"
    - "mmss_core/domains.py"
    - "mmss_core/orchestrator_core.py"
    - "mmss_activator.py"
  architectures: "architectures"

classification_keywords:
  mmss-sound-craft:
    - flowmusic
    - producer
    - audio
    - sound
    - timbre
    - rhythm
    - ase
    - lfe
    - lyrics
    - track
    - eq
    - gate
    - multiband
    - avatar
    - phoneme
  categories:
    - logic
    - space
    - layer
    - domain
    - category
    - rules
    - domains
  mmss-universal:
    - pfr
    - frp
    - ammss
    - mmss
    - formula
    - operator
    - fractal
    - temporal
    - context
    - metrics
    - eta_r

jsonl:
  max_examples_per_source: 9500
  min_content_length: 4
  train_split: 0.9

# Параметры управления процессом
processing:
  # Отключить дедубликацию по содержимому
  disable_content_deduplication: true
  # Отключить дедубликацию по имени файла и размеру
  disable_file_size_deduplication: true
  # Отключить ограничения на длину данных
  disable_length_limits: true
  # Сохранять отдельные JSON файлы для каждого примера
  save_individual_json: true
  # Максимальный размер файла для обработки (0 = без ограничений)
  max_file_size_bytes: 0
  # Минимальный размер файла для обработки
  min_file_size_bytes: 0

stage4:
  raw_dataset: "D:/WORK/CLIENTS/extract/scripts/new-dataset"
  # helper_json: "D:/WORK/CLIENTS/extract/prepare-for-fine-tuning-dataset-kaggle-gemma/helper_mmss_builder.json"
  ready_for_dataset: "D:/WORK/CLIENTS/extract/prepare-for-fine-tuning-dataset-kaggle-gemma/ready-for-dataset2"
  source_archive: "mmss_core/ai/source_files_done2"
  meta_yaml: "packages/mmss_meta_core_v6.yaml"
  max_raw_docs: 9400
  max_archive_files: 800
  max_helper_items: 2
  max_yaml_ops: 2
  max_architecture: 10000
